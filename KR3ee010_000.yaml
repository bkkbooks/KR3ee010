front:
  text: 經絡統序經絡者人之元氣伏於氣血之中周身流行晝夜無間所謂脈也其脈之直行大隧者為經其脈之分派交經者為絡其脈絡之支別者如樹之有枝又以其自直行之脈絡而旁行之者也人肖天地以有生其經絡亦肖天地之時運以流行如每日寅時肺臟生卯時流入大腸經辰胃巳脾午心火未時又到小腸經申屬膀胱酉屬腎戊居包絡亥三焦子膽醜肝又屬肺十二經脈任流行十二經之脈一有壅滯則病太過不及則病外邪入經絡亦病有始在一經久而傳變為症多端其症各有經絡如一頭疼也而有左右之分前後不同一眼病也而有大眥小眥黑珠白珠上下胞之異當分經絡而治經絡不分倘病在肺經也而用心經藥則肺病不除徒損其心病在血分也而用氣藥則氣受其傷而血病益甚至外邪入經絡而為傳變之症尤不可不分經絡東垣曰傷寒邪在太陽經誤用葛根湯則引邪入陽明是葛根湯乃陽明經藥非太陽經藥也由此推之患病之夭於藥者不知其幾許人矣方書云不明十二經絡開口動手便錯誠確論也世之庸醫輒曰吾大方脈也非針灸科何必識穴曾不思先知經絡後能定穴穴可不識經絡亦可不知乎此其所以為庸也今所匯之書經絡最晰穴不混淆使學者因穴以尋絡因絡以尋經經絡瞭然直尋病源庶用藥無惑仁人君子有實心濟世者當注意於此矣
