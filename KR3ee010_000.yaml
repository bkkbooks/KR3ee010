body:
  text: 原始萬物生於造化之中必賴元氣積累漸次而成形兒在母腹之中亦賴氣血滋長漸次而成體人物之生皆有所本云何也太極乃一氣耳太極生兩儀兩儀生四象四象生五行五行備而萬物生矣當兩儀未判之先總一太極也太極如卵然內則陰陽混沌也至開闢而分天地輕清為天重濁為地天垂象而有日月星辰地奠形而有山川土石此兩儀生四象也四象具而五行彰一生水水全清未有渣滓二生火火則薰灼溷濁而將凝也三生木木則半剛半柔而體質成矣四生金全至剛而體質堅矣五生土土則重大質厚而成形是五行備矣五行既備則陰陽交合而化生萬物也人得天地之正氣而生既有陰陽即分男女故稟乾道之粹者為男稟坤道之粹者為女乃鍾五行之秀得氣化之全者也故頭圓象天足方象地兩目以象日月四肢以象四時五臟以象五行六腑以象六氣呼吸以象氣機寤寐以象晝夜血脈以象江河毛髮以象草木骨節以象周天之度一身之中無不肖乎天地天地間最靈於物者也上以治歷明時下以分州畫野中以立綱陳紀輔相天地之不及裁成天地之太過所以參天地而為三才也其物之動而為獸者稟陰陽之偏頭體橫四肢皆足而走其物之動而為禽者稟陰陽之盛頭向上而有翼能飛其物之動而為水族者稟陰陽之至無翼足而沉水植物本乎地故根入於地枝葉向乎天此皆造化自然之妙也今以人之形化言之易曰男女媾精萬物化生蓋精血會聚胎孕乃成其胎一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髮生七月遊其魂而能動左手八月遊其魄而能動右手九月三轉身十月滿足而生也又曰一月為胞精血凝也二月為胎形兆胚也三月陽神為主魂動生靈也三魂一曰爽靈二月胎胱三曰幽精四月陰靈為七魄靜鎮形也七魄一名屍狗二名伏矢三名雀陰四名吞賊五名非毒六名除穢七名臭肺五月五行分臟以安神也六月六律定腑用滋靈也七月七精開竅通光明也八月八景神具降真靈也九月宮室羅布以定精也十月氣足萬象成也又有云其臟腑生成之次第若陰包陽者為男先生左腎陽包陰者為女先生右腎其次腎生脾脾生肝肝生肺肺生心以生其勝己者腎屬水故五贓由是為陰其次心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀胱生三焦以生其已勝者小腸屬火故六腑由是為陽其次三焦生八脈八脈生十二經十二經生十五絡十五絡生一百八十系絡系絡生一百八十纏絡纏絡生三萬四千孫絡孫絡生三百二十五骨節骨節生三百二十五大穴大穴生八萬四千毛竅則耳目口鼻四肢百骸之身皆備矣且婦人懷孕其各經逐月滋養胎元皆有次第一月足厥陰肝脈養二月足少陽膽脈養三月手厥陰心包絡脈養四月手少陽三焦脈養五月足太陰脾脈養六月足陽明胃脈養七月手太陰肺脈養八月手陽明大腸脈養九月足少陰腎脈養十月足太陽膀胱脈養諸陰陽各養兒三十日惟手太陽小腸與手少陰心脈二脈不養者以其下主月水上為乳汁故也若孕婦病而胎不安就子所養月分詳其氣血多寡察其有餘不足而調之臟腑聯絡分合詳說人生而百骸俱備九竅耳目口鼻陽七竅前後陰二竅皆靈惟口之一竅乃飲食之所從入氣息呼吸之道路門戶之首稱也如口之上下口唇名為飛門言其動運開張如物之飛搖也上下牙齒名為戶門言其能司出入如戶之啟閉也雖屬足陽明經其本又從腎生腎主骨故曰牙齒者骨之餘牙齒以內則舌居焉舌乃心之苗其本又兼脾腎二經舌上隱竅曰廉泉舌動而津液湧出穴在結喉下又有云舌根下近牙處一小穴名玉池穴下通腎經舌動而清水出即腎水上潮仙家謂之赤龍攪海上齶之後如小舌而下垂者曰懸雍乃發聲之機也懸雍之下舌之後有咽喉二竅同出一脘異塗施化二道並行各不相犯喉在前主出納名吸門其管堅空其硬若骨連接肺本為氣息之路呼吸出入下通心肺之竅以激諸脈之行此氣管也咽在後主吞嚥名咽門其管柔空其軟若皮下接胃本為飲食之路水食同下並歸胃中此食管也吸門咽門之間又有會厭其形非肉非骨由似肉似骨如錢之大覆於吸門之上為聲音之關薄則易於啟發音出快而利便厚則啟發遲音出慢而聲重吸門氣出則會厭開張若飲食自口入咽必由吸門而過會厭即垂緊蓋吸門飲食由會厭之上而入咽門毫不犯喉言語呼吸則會厭開張若當食之時偶有言語會厭因之而開張覆蓋不嚴則飲食乘氣逆入喉門而嗆矣氣管九節重十二兩長一尺二寸廣二寸內有十二小孔孔不外透乃氣息之路謂之十二重樓仙家謂之十二等級下聯肺本以肺乃相傳之官又為華蓋居諸臟之上以覆蓋諸臟統一身之氣六葉兩耳中有二十四空虛如蜂窠下無透竅故吸之則滿呼之則虛一呼一吸消息自然無有窮也主藏魄重三斤三兩附著於脊之第三椎肺之下而心系焉心乃君主之官形如未放蓮花中有七孔三毛又有云其象尖長扁圓其色黑赤黃其中竅數多寡各異迥不相同上通於舌下無透竅統一身之血主藏神重十二兩藏精汁三合附著於脊之第五椎外有脂膜包裹赤黃色為心包絡在心下橫膜之上豎膜之下與橫膜相聯共成一片周迴斜著於脊脅俗名謂之羅膈遮隔腸胃濁氣使不得上薰心肺所謂膻中也膻在兩乳之間為氣之海清氣所居之地主呼吸而條貫百脈者包絡羅膈與諸贓腑所聯之脂膜俱繫於脊之上下而包絡羅膈則繫於脊之第七節諸臟系皆於此而通於心而心亦於是而通諸臟經云七節之傍中有小心傍非傍側之傍脊有左右兩傍而小心居於其前乃神靈之官也禁不可刺心有四系一系上通於肺肺受清氣下乃灌注以朝百脈一系循脊從左透膈而通於肝肝乃將軍之官如木甲折之象左三葉右四葉凡七葉亦有繫上絡心肺為血之海上通於目下亦無透竅主藏魂重四斤四兩附著於脊之第九椎膽即繫於肝之短葉膽者中正之官決斷出焉重三兩三銖藏汁三合一名謂之青腸一系循脊近右透膈而通於脾脾在肝下乃倉廩之官與胃同膜而附其上其色如鳥脾赤紫其形如刀鐮聞聲則動動則磨胃食乃消化主藏意與智重三斤三兩長五寸廣三寸有散膏半斤主裹血而藏榮附著於脊之第十椎一系入肺兩大葉間由肺葉而下曲折後向並連脊膂細絡貫脊髓透膈而通於腎腎在脾下腎乃作強之官形如豇豆色紫黑有二枚相併而附著於脊之十四椎兩傍各一寸五分右為陽水左為陰水相對有橫管一條相通中間有一穴是命門乃相火也經云兩個一般無兩樣中間一點是真明正此之謂也主藏精與志外有黃脂包裹內裹淡白各有帶二條上條繫於心下條過屏翳穴後趨脊骨下有大骨在脊之端如半手許中有兩竅是腎經帶脈過處上行夾脊至腦中是謂髓海五臟之真惟腎為根上下有竅穀味之液化為氣血氣血壯盛化生精脈精脈滿足人乃久生蓋五臟皆有精而腎乃其聚處所以謂腎乃精之舍若腎精絕則五臟之氣血無餘豈能久生乎所以人當調和飲食以養後天之氣血保攝精脈以養先天之元氣此喉之一竅臟相聯絡者如此食管自咽門至胃長一尺六寸透膈而通於胃胃之上口即食管下口名為賁門言其如物之奔而不返也胃乃倉稟之官水穀之海號曰太倉又謂之黃腸重三斤十二兩紆曲屈伸長二尺六寸廣一尺五寸徑五寸容谷二斗水一斗五升為受納之府腐化水穀胃之下口即小腸上口名為幽門言其幽暗隱秘之處水穀由此而入小腸小腸乃承受之官化物出焉重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積盤十六曲容谷二斗四升水六升三合之大半又謂之赤腸小腸下口即大腸上口名為闌門言其闌約水穀從此泌別清濁其清之如水者滲入膀胱而為溺膀胱與小腸以脂膜相聯有下口無上口承受闌門之清而為溺者亦藉此脂膜以相通也為其內空善受濕氣濕氣入始化而為溺為州都之官津液藏焉氣化則能出矣重九兩二銖縱廣九寸盛溺九升三合又謂之黑腸其濁之滓穢者傳入大腸大腸乃傳導之官變化出焉重二斤十二兩長二丈一尺廣四寸徑一寸寸之少半右回疊積盤十六曲盛谷一斗水七升半又名迴腸大腸下口即直腸上口名為魄門直腸下口名為肛門滓穢之物從此出焉此咽之一竅腑相聯絡者如此膽在肝中無竅通腑三焦無形借形為形所以不曾續於腑之聯絡中詳說在各臟腑圖論內臟腑有相合者有不相合者有大相懸絕者臟與臟相合者心肺也贓與臟相懸絕者肺腎也臟與腑相合者肝膽也脾胃也腑與腑相合者胃與小腸小腸與大腸也膀胱雖附於小腸非有孔道貫通者是脂膜與小腸相聯而淡滲耳項中有二竅前則喉後則咽玉莖亦有二竅上則溺管下則精管婦人牝漏之內亦有二竅其溺孔在上小便從此而生或病淋濁亦從此出其行經旋精或崩漏遺泄皆從下管而出婦人下管又名庭孔血室子宮知此則知淋濁遺泄崩帶不一源矣五臟六腑俱相聯絡而著於脊又不可不知耳者腎之竅眼者肝之竅口者脾之竅舌者心之竅鼻者肺之竅腎主骨牙者骨之餘肝主筋指甲筋之餘脾主肌肉凡肉之盡處皆屬脾如上下眼皮上下唇皮耳垂並周圍之邊指甲周圍之邊之類是也心主血發者血之餘肺主皮毛遍身毛孔皆其餘以上言臟腑聯絡貫串之形以下言臟腑氣血流行之脈詳說見各臟腑圖論中手太陰肺經左右共二十二穴肺臟之圖危言曰肺者茷也茷茷然居乎上為五臟之華蓋醫旨緒餘曰肺者勃也言其氣勃鬱也難經曰肺重三斤三兩手太陰經肺肺者相傳之官治節出焉統一身之氣主藏魄與大腸為表裡其母脾土其子腎水其克肝木其賊心火其華在毛其充在皮其位西其時秋其色白其脈澀而短其音商其數九其臭腥其惡寒其液涕其聲哭其味辛在五行屬金其外候竅通於鼻其形四垂如蓋六葉兩耳凡八葉附著於脊之第三椎中有二十四空虛如蜂窠下無透竅故吸之則滿呼之則虛一呼一吸消息自然司清濁之運化為人身之橐龠行列分布以行諸臟之氣其經多氣而少血寅時氣血注此其不足則太息其有餘則喘嗽其平脈浮短其賊脈洪其死丙丁日其畜馬其谷稻上為太白星其見證也善嚏悲愁欲哭灑浙寒熱缺盆中痛腹痛肩背痛臍右少腹脹痛小便數溏泄皮膚痛及麻木喘少氣頰上氣見形寒飲冷則傷肺實則夢兵戈競擾虛則夢田野平原憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛辛走氣氣病毋多食辛多食苦則皮膚槁而毛拔其經之脈起於中焦受足厥陰之交下絡大腸復行本經之外還循胃口迤邐上膈而會屬於肺臟從肺系出而橫行胸部四行之中府雲門以出腋下下循臑內歷天府俠白行少陰心經手厥陰心主包絡兩經之前下入肘中抵尺澤循臂內上骨之下膔歷孔最列缺穴入寸口之經渠太淵以上循魚際出大指之端少商穴而絡脈之支行者從腕後列缺穴達次指內膔出其端而交於手陽明經由合骨二間三間以至於商陽穴又自商陽而上行也肺臟諸穴歌手太陰十一穴中府雲門天府列俠白下尺澤孔最見列缺經渠太淵下魚際抵指少商如韭葉又分寸歌太陰肺兮出中府雲門之下一寸許雲門璇璣旁六寸巨骨之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘中約文論孔最腕下七寸取列缺腕上一寸半經渠寸口陷中是太淵掌後橫紋頭魚際節後散脈舉少商大指端內側鼻衄刺之立見止璇現任脈穴名巨骨手陽明大腸經穴名手陽明大腸經左右共四十穴大腸腑之圖迴腸者以其回疊也廣腸即迴腸之更大者直腸又廣腸之末節也下連肛門是為穀道後陰一名魄門總皆大腸也廣腸長二尺八寸受谷九升三合八分合之一難經曰大腸重二斤十二兩肛門重十二兩危言曰腸者暢也貴通暢也手陽明經大腸大腸者傳導之官變化出焉其體長二丈一尺廣四寸徑一寸當臍右回十六曲受谷一斗水七升半其上口接小腸之下口在干為庚在支司酉在五行屬金在八卦為兌與太陰肺為表裡其經氣血俱多卯時氣血注此其見證也齒痛頗腫目黃口乾鼻衄喉痹肩前臑痛大指次指難用耳聾輝輝焞焞耳肺嘈嘈耳後肩臑肘臂外皆痛氣滿皮膚堅而不痛氣盛則脈太過而熱腫虛則脈不給而寒慄其經之脈起於大指次指之端商陽穴受手太陰之交行陽之分由是循次指之上廉歷二間三間以出合谷兩骨之風復上入陽谿兩筋之中自陽谿而上循臂上廉之偏歷溫溜下廉上廉三里入肘外廉之曲池循膀外前廉歷肘髎五里臂臑絡手少陽之臑會上肩至本經之肩髃出肩髃之前廉循巨骨上行會督之大椎由大椎而下入足陽明之缺盆循足陽明之外絡繞肺臟復下膈當胃經天樞之分會屬於大腸其支者自缺盆上行於頸循天鼎扶突上貫於頰入下齒縫中由齒縫復出俠口兩吻相交於人中之內左脈之右右脈之左上俠鼻孔循禾髎迎香以交於足之陽明經而由承泣四白巨髎地倉至頭維又自頭維而下行也大腸經諸穴歌手陽明廿穴名循商陽二間三間而行歷合谷陽谿之俞過偏歷溫溜之濱下廉上廉三里而近曲池肘髎五里之程臂臑肩髃上於巨骨無鼎紆乎扶突禾髎唇連迎香鼻迫又分寸歌商陽鹽指內側邊二間來尋本節前三間節後陷中取合谷虎口岐骨間陽谿上側腕中是偏歷腕後三寸安溫溜腕後去五寸池前五寸下廉看池前三寸上廉中池前二寸三里逢曲池曲骨紋頭盡肘髎大骨外廉近大筋中央尋五里肘上三寸行向里臂臑肘上七寸量肩髃肩端舉臂取巨骨肩尖端上行天鼎喉旁四寸真扶突天突旁三寸禾髎水溝旁五分迎香禾髎上一寸大腸經穴自分明足陽明胃經左右共九十穴胃腑之圖胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣播於諸脈卮言曰胃者匯也號為都市五味匯聚何所不容萬物歸土之義也難經曰胃重二斤一兩胃之下口即小腸上口名幽門足陽明經胃胃者水穀之海六腑之大源其體大一尺五寸紆曲屈申長二丈六寸容谷二斗水一斗五升位居中焦在五行屬土與足太陰為表裡其經氣血俱多官與脾同辰時氣血注此其見證也灑然振寒善呻數欠顏黑病至則惡人與火聞木音則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧濕淫汗出鼽衄口喎唇胗頭腫喉痹大腹水腫膝濱腫痛循膺乳氣衝股伏兔骭外廉足跗上皆痛中指不用氣盛則身前熱其有餘於胃則消穀善飢溺色黃氣不足則色皆寒慄胃中塞則脹滿其經之脈受手陽明之交起於鼻兩旁手陽明之迎香穴由是而上左右交於額中過足太陽睛明之分下循鼻外曆本經承泣四白巨髎入上齒縫中復出循地倉挾兩口吻環繞唇下左右相交於承漿之分由承漿循頤後之下廉出大迎循頰車上耳前過膽之客主人循髮際會足少陽之懸釐頷厭之分循下關頭維會於膽之懸顱督之神庭分支絡從大迎前下人迎循喉嚨歷水突氣舍入缺盆行足少陰俞府之外下膈當上脘中脘之分屬胃絡脾於此分支從缺盆下乳內廉循氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉下挾臍歷過天樞外陵大巨水道歸來諸穴入氣衝中即氣衝其支行者自屬胃處起於胃之下口循腹裡過足少陰育愈之外本經之裡下至氣衝於前直行入氣衝者相合自此而行髀關抵伏兔歷陰市梁丘下入膝臏中於此又分正支經犢鼻下循胻外之三里上巨虛條口下巨虛豐隆解谿下足附之衝陽陷谷入中指外間之內庭至歷兌而終其抽支自膝下三寸循三里穴之外別行而下入中指外間與前入內庭歷兌正支合又一小支自附上衝陽穴別行入大指間斜出足厥陰行間穴之外循大指下出其端以交於足之太陰經由隱白大都太白公孫商丘而上行也胃經諸穴歌足陽明四十五自承泣四白而數巨髎有地倉之積大迎來頰車之夥下關頭維以人迎水突氣舍與缺盆氣戶兮庫房屋翳膺窗兮乳中乳根不容承滿梁門關門太乙滑肉天樞外陵大巨從水道歸來氣衝入髀關之境伏兔至陰市梁丘犢鼻自三里而行上巨虛兮即上廉條口下巨虛兮即下廉豐隆解谿衝陽入陷谷下內庭厲兌而終又分寸歌胃之經兮足陽明承泣目下七分尋四白目下方一寸巨髎鼻孔旁八分地倉夾物四分近大迎頷下寸三中頰車耳下八分穴下關耳前動脈行頭維神庭旁四五神庭督脈穴在中行髮際上五分頭維去神庭四寸五分人迎喉旁寸五真水突筋前迎下在氣舍突下穴相乘氣舍在水突下缺盆舍下橫骨內各去中行寸半明氣戶璇璣旁四寸至乳六寸又四分庫房屋翳膺窗近乳中正在乳頭心次有乳根出乳下各一寸六不相侵自氣戶至乳根六穴上下相去各一寸六分去中行任脈各四寸卻去中行須四寸以前穴道與君陳不容巨闕旁三寸巨闕任脈穴臍上六寸五分卻行幽門寸五新幽門腎經穴巨闕旁一寸五分在胃經任脈二脈之中其下承滿與梁門關門太乙滑肉門上下一寸無多少共去中行三寸中天樞臍旁二寸間樞下一寸外陵安樞下二寸大巨穴樞下四寸水道全樞下六寸歸來好共去中行二寸邊氣衝鼠鼷上一寸鼠鼷橫骨盡處又去中行四寸專髀關膝上有尺二伏兔膝上六寸是陰市膝上方三寸梁丘膝上二寸記膝臏陷中犢鼻存膝下三寸三里至膝下六寸上廉穴膝下七寸條口味膝下八寸下廉看膝下九寸豐隆系卻是踝上八寸量比那下廉外邊綴解谿去庭六寸半庭內庭也衝陽庭後五寸換陷骨庭後二寸間內庭次指外間現足大指次指外間陷中歷兌大指次指端去爪如韭胃井判璇璣任脈穴名足太陰脾經左右共四十二穴脾臟之圖遺篇刺法論曰脾為諫議之官知周出焉滑氏曰掩乎太倉華元化曰脾主消磨五穀養於四旁中梓曰脾胃屬土俱從田字胃居正中田字亦中脾處於右田亦偏右難經曰脾重二斤三兩廣扁三寸長五寸有散膏半斤主裹血溫五藏足太陰經脾脾者倉稟之官五味出焉乃榮之居也主藏意與智主一身之肌肉為五臟之本其母心火其子肺金其克腎水其賊肝木其華在唇四白其充在肉其位中央其時長夏其脈緩其色黃其音宮其數五其臭香其聲歌其味甘其惡濕其液涎在五行屬土其外竅通於口其形廣三寸長五寸掩候於太倉附著子脊之第十一椎與胃為表裡其經多氣而少血巳時氣血注此其不足則少氣其有餘脹滿其平脈緩其賊脈弦其死甲乙日其畜牛其谷稷上為鎮星其見證也五泄二便閉面黃舌本強口甘食則嘔胃脘痛腹脹腸鳴善噫善飢後出餘氣則快身體四肢倦怠食不下咽煩心心下急痛寒瘧溏瘕泄水閉黃疽不能臥強立股膝內腫足大指不為用飲食勞倦則傷脾實則夢歡歌快樂虛則夢飲食相爭思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘甘走肉肉病毋多食甘多食酸則肉胝䐢而唇揭其經之脈起於足大指之端隱白穴受足陽明之交由是循大指內側白肉際大部穴過核骨後歷太白公孫商丘上內踝前廉之二陰交上腨內循胻骨後之漏谷上行二寸交出足厥陰中都穴之前至地機陰陵泉自陰陵泉上循膝骨內之前廉血海箕門迤邐入腹經衝門府舍會任脈之中極關元復循腹結大橫會任脈之下脘歷腹哀過足少陽之日月足厥陰之期門復循本經腹哀之裡下至任之中脘下脘之際屬脾而絡於胃再由腹哀上膈循食竇天溪胸鄉周榮由周榮外曲折向下至大包由大包外曲折向上會於肺之中府上行交胃經人迎穴之裡挾咽連舌散舌本而終其支者循腹哀行至胃部會任脈之中脘外上膈注於任之膻中之裡而交於手少陰心經文自極泉而下行也脾經諸穴歌足太陰脾中洲二十一穴太自遊趙大都穴瞻太白訪公孫兮至商丘越三陰之交而漏谷地機可即步陰陵之泉而血海箕門是求入衝門兮府舍軒豁解腹結兮大橫優遊腹哀食竇兮接天溪而同派胸鄉周榮兮綴大包而如鉤又分寸歌大指端內側隱白節後陷中求大都太白內側核骨下節後一寸公孫呼商丘內踝微前陷踝上三寸三陰交踝上六寸漏谷是漏上五寸地機朝膝下內側限陵泉血海膝臏上內廉箕門穴在魚腹取動脈應手越筋間衝門期下尺五分期門肝經穴巨闕旁四寸五分巨闕任脈穴臍上六寸五分府舍期下九寸看腹結期下六寸入大橫期下五寸半腹哀期下方二寸期門肝經穴道現巨闕之旁四寸五卻連脾穴休胡亂自此以上食竇穴天溪胸鄉周榮貫相去寸六無多寡又上六寸中府換大包腋下有六寸淵液腋下三寸絆淵液膽經穴腋下三寸與脾大包穴相連手少陰心經左右共十八穴心臟之圖心象尖圓形如蓮蕊其中有竅多寡不同以導引天真之氣下無透竅上通乎舌共有四系以通四臟心外有赤黃裹脂是為心包絡心下有膈膜與脊脅周迴相著遮蔽濁氣使不得上熏心肺所謂膻中也手少陰經心心者君主之官神明出焉統一身之血主藏神以膻中為腑與小腸為表裡其母肝木其子脾土其克肺金其賊腎水其時夏其色赤其脈洪而鉤其位南其卦為離其音徵其惡熱其數七其味苦其臭焦其華面其液汗其聲笑在五行屬火其經多氣而少血午時氣血注此其形如未放蓮花中有七孔三毛又有云其象尖長扁圓其色黑赤黃其中竅數多寡各異其外候竅通於舌重十二兩盛精汁三合居肺下膈上附著於脊之第五椎有四系一系上通於肺一系循脊從左透膈而通於肝一系循脊近右沒透於脾一系入肺兩大葉間由肺葉而下曲折後向正連脊膂細絡貫脊髓與腎相通於七節之間而諸臟系皆於此而通於心而心亦於是而通於諸臟其不足則憂其有餘則笑不休其平脈洪其賊脈沉其死壬癸曰其畜羊其谷黍上為熒惑星其見證也消渴兩腎內痛後廉腰背痛浸淫善笑善驚善忘上咳吐下氣泄眩僕身熱腹痛而悲憂愁思慮則傷心實則夢憂驚恐怖虛則夢煙火焰明喜傷心恐勝喜熱傷氣寒勝熱苦傷氣酸勝苦苦走血血病毋多食苦多食鹹則脈凝位而變色其經之脈受足太陰之交起於心中循任脈之外屬心系下膈當臍二寸之分而絡小腸其支者從心系上挾咽系目其直者復從心系直上至肺臟之分出循腋下抵極泉自極泉下循臑內後廉行手太陰心主兩經之後歷青靈穴下時內廉抵少海手腕下踝為兌骨自少海而下循臂內廉循歷靈道通里至掌兌骨之端循陰郄神門入掌內廉至少府循小指端之少衝穴而終以交於下太陽經又由少澤前谷後谿而上行也心經諸穴歌手少陰九穴成極泉青靈少海深自靈道通里而達過陰郄神門而迎抵於少府少衝可尋又分寸歌少陰心起極泉中腋下筋間脈入胸臂內腋下筋間動脈入胸青靈肘上三分取時舉臂取之少海肘後端五分肘內廉節後大骨外出肘端五分屈肘向頭得之靈道掌後一寸半通里腕後一寸同陰郄腕後方半寸神門掌後兌骨隆少府節後勞宮直小指內側取少衝手太陽小腸經左右共三十八穴小腸腑之圖小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲容谷二斗四升水六升三合合之大半手太陽經小腸小腸者受盛之官化物出焉其體長三丈二尺左回疊十六曲其上口接胃之下口其下口按大腸之上口在臍上一寸水分穴至是泌別清濁其水液清者入膀胱渣滓濁者入大腸在五行屬火在八卦為離與手少陰為表裡其經多血而少氣未時氣血注此其見證也嗌痛額頷腫痛不可以顧腰似折耳聾目黃頰腫頸頷肩臑肘臂外後廉痛其經之脈起於小指之端外側少澤穴受手少陰心經之交由是循手指外側之前谷後谿上腕出踝中歷腕骨陽谷養老自養老直上循臂骨下廉支正穴出時內側兩筋之間歷小海穴上循臑外後廉行手陽明少陽之外出肩解繞肩𩨹上肩循肩貞臑俞天宗秉風曲垣肩外俞肩中俞諸穴上會於督之大椎分左右相交於兩肩之上由此入足陽明之缺盆循肩向腋下行當任脈膻中之分絡心循胃系下膈過任之上脘中脘抵胃下行任脈之外當臍上二寸之分屬小腸其支者從胃之缺盆循頸之天窗天容上頰抵顴髎上至目外角之銳眥過足少陽之瞳子髎卻入耳中循聽宮而終其支者別循頰上䪼抵鼻至目內眥睛明穴以斜絡於顴而交於足之太陽經足太陽起睛明通天自通天斜行左右相交於巔上之百會分支而下行也小腸經諸穴歌小腸穴十九中路從少澤步前谷後谿之隆道遵腕骨觀陽谷養老之崇得支正於小海逐肩貞以相從值臑俞兮遇天宗乘秉風兮曲垣中肩外俞兮肩中俞啟天窗兮見天容匪由顴髎易造聽宮又分寸歌小指端外為少澤前谷外側節前覓節後捏拳取後谿腕骨腕前骨陷側兌骨下陷陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞𩨹下兩骨解𩪰俞大骨下陷考大骨下𩨹上廉舉臂取之天宗秉風后骨陷秉風髎外舉有空天髎外肩上髃後舉臂有空曲垣肩中曲𩨹陷外俞𩨹後一寸從即外肩俞肩𩨹上廉去脊三寸肩中二寸大杼旁天窗扶突後陷詳頸大筋間前曲頰下扶突後動脈應手陷中天容耳下曲頰後顴髎面煩銳端星面頄骨下廉銳骨端陷中聽宮耳端大如菽耳中珠子大如赤小豆此為小腸手太陽足太陽膀胱經左右共一百二十六穴膀胱腑之圖膀胱重九兩二銖縱廣九寸盛尿九升九合廣二寸半甲乙經曰膀者橫也胱者廣也言其體橫廣而短也足太陽經膀胱膀胱者州都之官津液藏焉氣化則能出矣注曰位當孤腑故謂都官居下內空善受濕氣故藏津液若得氣海之氣施化則溲便注泄氣海之氣不及則隱閉不通故曰氣化則能出矣所謂孤腑者諸腑俱有口上下相通惟膽與膀胱與諸腑無相通之口膽與肝為表裡膽在肝內臟腑合一亦為不孤膀胱與腎雖是表裡氣血相通形不合一獨居於臟腑之下孤腑之所由稱也膀胱之體重九兩二銖縱橫二寸居腎下之前大腸之側當臍上一寸水分穴之所小腸下口乃膀胱之上際也膀胱有下口無上口實與小腸無口相接惟有脂膜相連其脂膜包裹膀胱如綿球之狀其脂膜與脾之大絡各臟腑之脂膜俱相聯所以謂脾之濕氣亦能滲入膀胱而化為溺但不若脂膜中之絡系上通於小腸之下口大腸之上口相交會處而為闌門者闌約水穀清濁從此泌別濁之濁者傳入大腸濁之清者由脂膜之絡系滲入膀胱膀胱實無上口所謂有上口者非也方書有云飲食之味氣入於胃稟脾之運化而胥為濕氣若炊甑然蒸蒸布焌充拓於郛廓之內其輕清者上而為榮血為清氣為津液其慓悍者為衛氣濁中濁者傳入小腸大腸而為屎濁中清者滲入膀胱而為溺未入之先尚是濕氣既入始化而成溺一管直達前陰而出矣又有精管循腰脊繞大腸之右而同出於前陰但精管在溺管之下至玉莖龜頭挽歸一口其經多血而少氣申時氣血注此其見證也頭苦痛目似脫頭兩邊痛淚出臍反出下腫便膿血肌肉痿項似拔小腹脹按之欲小便不得其經之脈起於目內眥睛明穴受手太陽之交也上額循攢竹過督之神庭歷曲差五處承光通天自通天斜行左右相交於巔上督脈之百會由此分一支抵耳上角過足少陽之率谷浮白竅陰散養於諸經其直者由通天穴循絡卻玉枕入絡腦復出下項抵天柱自天柱而下通督之大椎陶道卻循肩膊內挾脊兩旁相去各一寸半下行歷大抒風門肺俞厥陰俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂俞白環俞由是抵腰中入循膂絡腎屬膀胱由腰中又分支循腰髀下挾脊歷上髎次髎中髎下髎出會陽下貫臀至承扶殷門浮郄委陽入膕中之委中穴又一正支自天柱而下從膊左右別行下貫胛膂歷附分魄戶膏育神堂噫嘻膈關魂門陽綱意舍胃倉育門志室胞盲秩邊下歷尻臀過足陽明之髀樞循髀外後廉髀骨之裡承扶之外一寸五分之間而下與前之入膕者相合正支者下行循合陽下貫腨內歷承筋承山飛揚附陽出外踝後之崑崙僕參申脈金門循京骨束骨通谷至小指外側端之至陰穴以交於足少陰之經由湧泉然谷而上行也膀胱經諸穴歌足太陽六十三睛明攢竹詣曲差五處之分承光通天見絡卻玉枕之行天柱高兮大抒抵風門開兮肺俞當厥陰心膈之會肝膽脾胃之藏三焦腎兮大腸小腸膀胱俞兮中膂白環自從大抒至此去脊中寸半之間又有上次中下四髎在腰四空以和調會陽居尻尾之旁尻尾任脈穴名吾背二行始了仍上二椎旁附分二椎下兩旁去脊中三寸三椎旁魄戶膏育並四椎而過神堂噫嘻兮膈關魂門陽綱意舍兮胃倉盲門志室胞育背以秩邊而分承扶浮郄與委陽殷門委中而合陽至承筋與承山到飛揚與附陽會崑崙僕參申脈探金門京骨之場由束骨而通谷抵小指外至陰之門又分寸歌足太陽膀胱經目內眥角始睛明眉頭陷中攢竹取曲差發際上五分五處發上一寸是承光發上二寸半通天絡卻玉枕穴相去寸五調勻看玉枕夾腦一寸三入發二寸腕骨見天柱項後髮際中大筋外廉陷中獻自此夾脊開寸五第一大抒二風門三椎肺俞厥陰四心俞五椎之下論膈七肝九十膽俞十一脾俞十二胃十三三焦十四腎大腸十六之下椎小腸十八膀十九中膂內俞二十椎白環二十椎下當白環俞即腰俞以上諸穴可排之更有上次中下髎一二三四腰空好會陽陰尾反骨旁背部二行諸穴了又從脊上開三寸第二椎下為附分三椎魄戶四膏育第五椎下神堂尊第六噫嘻膈關七第九魂門陽綱十十一意舍之穴存十二胃倉穴已分十三育門端正在十四志室不須論十九胞盲廿秩邊背部三行諸穴勻又從臀下陰攻取承扶居於陷中主浮郄扶下方六分委陽扶下寸六數殷門扶下六寸長膕中外廉兩筋鄉委中膝膕約紋里此下三寸尋合陽承筋腳裙上七寸穴在腨腸之中央承山腨下分肉間外踝七寸上飛揚附陽外踝上三寸崑崙外跟陷中央僕參亦在踝骨下申脈踝下五分張金門申脈下一寸京骨外側骨際量束骨本節後陷中通谷節前陷中計至陰卻在小指側以上諸穴屬膀胱足少陰腎經左右共五十四穴腎臟之圖父母媾精未有形象先結河車中間透起一莖如蓮蕊初生乃臍帶也蕊中一點實生身立命之原即命門也自此天一生水先結兩腎夫命處於中兩腎左右開合正如門中棖闑故曰命門蓋一陽處於二陰之間所以成乎坎也甲乙經曰腎者引也能引氣通於骨髓卮言曰腎者神也妙萬物而為言也腎有兩枚形如豇豆重一斤一兩附脊十四椎當胃下兩旁前後與臍平直足少陰經腎腎者作強之官技巧出焉蟄藏之本精之居也五臟皆有精而腎乃其聚處所以謂腎者精之舍也以膀胱為腑其母肺金其子肝木其克心火其賊脾土其華在發其充在骨其位北其藏志其旺冬其色黑其脈沉而滑其音羽其數六其臭腐其惡燥其聲呻在七情為恐在六氣為寒在五味為咸在干為癸在支司子在八卦為坎在五行屬水其外候耳其形如豇豆色紫黑有二枚併入脊膂附著於脊之第十四椎兩旁各一寸五分外有黃脂包裹內里淡白兩腎相通有橫管一條中間一穴乃命門也前與臍平其經多氣而少血酉時氣血注此其不足則厥其有餘則腸泄其平脈沉其賊脈緩其死戊巳日其畜彘其谷豆上為辰星其見證也面如漆眇中清面黑如炭口渴舌乾咽腫干痛咳唾多血胸中滿大小腹痛大便難臍左脅下背肩髀間痛飢不飲食心懸如飢腹大脛腫咳嗽脊臀股後痛臍下氣逆小腹急痛泄足痿厥下腫足胻寒而逆腸癖陰下濕四指黑手指青厥足下熱嗜臥坐而欲起凍瘡下痢善思善恐四肢不收四肢不舉久坐濕地強力入水則傷腎實則夢腰脊解軟虛則夢涉水恐懼恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸咸走骨骨病毋多食鹹多食甘則骨疼痛而齒落其經之脈受足太陽膀胱經之交起於足小指之下斜趨足心之湧泉穴由湧泉轉出足內踝前起大骨下然谷之下循內踝之後太谿別入跟中之大鐘照海水泉循內踝行厥陰太陰兩經之後曆本經復溜交信穴過足太陰脾經之三陰交上腨內循築賓出膕內廉抵陰谷由陰谷上股內後廉貫脊會督脈之長強環出於前循本經橫骨大赫氣穴四滿中注盲俞當育俞之所臍之左右屬腎下臍過任脈之關元中極而絡膀胱其直者從育俞屬腎之所上行循商曲石夫陰都通谷等穴貫肝上循幽門上膈歷步廊入肺循本經神封靈墟神藏或中俞府而上循喉嚨並足陽明胃經之人迎挾舌本而終其支者自神藏別出繞心注胸會任之膻中以交於手厥陰心包絡之經自天池天泉而下行也腎經諸穴歌少陰腎經二十七湧泉然谷太谿位大鐘照海通水泉復溜交信築賓連陽谷橫骨與大赫氣穴四滿中注垣盲俞商曲石關位陰都通谷幽門纏步廊神封靈墟位神藏或中俞府全又分寸歌足掌心中是湧泉然谷踝下一寸前內踝前一寸太谿踝後跟骨上大鐘跟後踵中邊足跟後踵中大骨上兩筋門也水泉溪下一寸覓照海踝下四寸真復溜踝上前二寸交信踝上二寸聯二穴止隔筋前後太陰之後少陰前前旁骨是復溜後旁骨是交信二穴止隔一條筋築賓內踝上踹分陰谷膝下曲膝間橫骨大赫並氣穴四滿中注亦相連各開中行止寸半上下相去一寸便上隔盲俞亦一寸育俞臍旁半寸邊育俞商曲石關來陰都通谷幽門開各開中行五分俠六穴上下一寸裁步廊神封靈噓存神藏或中俞府尊各開中行計二寸上下寸六六穴同俞府璇璣旁二寸取之得法有成功馬玄臺曰陰都中脘旁五分通谷上脘旁五分幽門巨闕旁各五分又按下自橫骨大赫氣穴四滿中注上下各去一寸所謂橫骨在盲俞下五寸有以也但自橫骨至中注各開中行一寸半盲俞商曲石關陰都通谷幽門各開中行五分自步廊神封靈墟神藏彧中俞府去中行各二寸其屈曲有如此徐氏針灸書皆以二行言誤矣巨闕任脈穴名手厥陰心包絡經左右共一十八穴心胞絡經之圖心包一藏難經言其無形滑伯仁曰心包一名手心主以藏象校之在心下橫膜之上豎膜之下其與橫膜相黏而黃脂裹者心也脂膜之外有細筋膜如絲與心肺相連者心包也此說為是凡言無形者非胞絡者胞絡其心也即膻中也為心之所以來諸說不一承訛已久今考正之手厥陰心胞絡一名心主即膻中也膻中者臣使之官喜樂出焉或問手厥陰一經曰心主曰心包絡又曰膻中者何也蓋心君火也包絡相火也君火以名相火以位相火代君火行事以用而言故曰心主以經而言則曰心包絡又臼膻中者靈蘭秘典篇云膻中者臣使之官喜樂出焉蓋喜笑心火所司喜樂之意正與心應也獨稱臣使者君主之親臣也由是推之則包絡即膻中也膻中即心主也總一經而各異其名耳其形質在心下橫膜之上豎膜之下與橫膜相連而黃脂裹者心也其脂膜之外細筋膜如絲與心肺相連者心包絡也然包絡非止於心聯絡而包之己也其實一脂膜羅膈相聯與脾之大絡腹內之脂膜遍徹腔中統繫於脊臟腑藉此以相聯贓腑之氣血即藉此以相通既繫於脊則臟腑與軀殼相聯必藉此臟腑之氣血與軀殼相灌亦必藉此則包絡實臟腑之總司也有名有形所謂無形者非也其經多血而少氣與三焦為表裡戌時氣血注此其見證也笑不休手心熱臂肘攣急腋腫甚則胸腋肢滿面赤煩心其經之脈起於胸中出屬心下之包絡受足少陰腎經之交也由是下膈絡於三焦之上脘中脘其支者自屬心包上循胸出脅下腋三寸天池穴上行抵腋下下循臑內之天泉以界乎手太陰手少陽兩經之中間入肘中之曲澤穴又由肘中下臂行臂兩筋之間循郄門間使內關大陵入掌中勞宮循中指出其端之中衝其支別者從掌中循無名指出其端而交於手少陽三焦經自關衝液門而上行也心包絡經諸穴歌手厥陰心包之絡計有九穴之奇自天池天泉而始逐曲澤郄門而馳間使通乎內關大陵近於勞宮既有掌握乃抵中衝又分寸歌心絡起自天池間乳後一寸腋下三腋下三寸乳後一寸天泉曲腋下三寸曲澤屈肘陷中央郄門去腕方五寸掌後去腕五寸間使腕後三寸量內關去腕止二寸大陵掌後兩筋間勞宮屈中名指取屈中指無名指取之中指之末中衝詳手少陽三焦經左右共四十六穴三焦經之圖中藏經曰三焦者人之三元之氣也總領五臟六腑營衛經絡內外左右上下之氣三焦通則內外左右上下皆通其於周身灌體和內調外榮左養右導上宣下莫大於此也手少陽經三焦三焦者決瀆之官水道出焉上焦在胃上口其治在膻中中焦在中脘其治在臍旁下焦在膀胱之上其治在臍下一寸上焦如霧中焦如漚下焦如瀆雖有上中下其實徹上徹下皆腎間真陽之氣也膈膜脂膏之內五臟六腑之隙水穀流化之關其氣融會於其間薰蒸膈膜腐化水穀發達皮膚分肉運行四旁實元氣之別使也為元氣之別使者以元氣賴其導引潛行默運於一身之中所以謂活命之根也曰上中下者各隨所屬之部分而臟腑脂膜之空處皆是也是故雖無其形倚內外之形而得名雖無其實合內外之實而為位者也所謂借形以為形者也是此經本有名有形後世以為無狀有名者非也其經多氣而少血與手厥陰為表裡亥時氣血注此其見證也耳聾渾渾焞焞咽痛喉痹目銳眥角痛耳後肩臑時臂外皆痛小指次指不為用其經之脈受手厥陰心包絡經之交起於小指次指之端關衝穴上出次指之間歷液門中渚循手表腕之陽池出臂外兩骨之間循外關支溝會宗三陽四瀆上貫肘抵天井穴從天井上行循臂臑之外歷清冷淵消濼行手太陽之裡手陽明之外上肩循臑會肩髎天髎交出足少陽之後過手太陽之秉風足少陽之肩井下入陽明之缺盆復由足陽明之外而交會於膻中散布絡繞於心包絡下膈當胃上口以屬上焦於中脘以屬中焦於下脘以屬下焦其支者從任之膻中而出缺盆上項挾耳後過督之大椎循天牖上抵耳後經翳風瘛脈顱息直上出耳上角之角孫過足少陽之懸釐頷厭陽白及太陽睛明之分屈曲下頰至䪼會手太陽顴髎其又支者自翳風入耳之分中過手太陽之聽宮歷耳門行禾髎卻出至目銳眥會足少陽之瞳子髎循絲竹空而交於足少陽之膽經自瞳子髎聽會而下行也三焦經諸穴歌手少陽穴二十三關衝液門中渚旁陽池外關支溝位會宗三陽四瀆行天井清冷消濼位臑會肩髎天髎當天牖翳風瘛脈接顱息角孫耳門場禾髎絲竹空穴畢此經穴法細推詳又分寸歌無名之外端關衝液門小次指陷中中渚腋下去一寸陽池腕上之陷中外關腕後方二寸腕後三寸開支溝臂外三寸兩骨間腕後三寸內會宗空中有穴細心求腕後四寸三陽絡四瀆肘前五寸著天井時外大骨後骨罅中間一寸摸肘後二寸清冷淵消濼臑節腋臂下看臑會肩前三寸中肩前廉去肩頭三寸宛宛中肩髎臑上陷中央天牖容之後存天牖頸大筋外缺盆上天容後天柱前完骨下髮際上翳風耳後尖角陷耳後尖角陷中拔之引耳中瘛脈耳後青脈現顱息亦在青絡脈角孫耳廊中間上耳門耳前起肉中耳前起肉當耳缺陷中禾髎耳前動脈張欲覓絲竹空何在眉後陷中仔細量足少陽膽經左右共八十六穴膽腑之圖膽在肝之短葉間重三兩三銖藏精汁三合狀如瓶中梓曰膽者擔也中正之官決斷出焉言有擔當也足少陽經膽膽者中正之官決斷出焉又曰膽者澹也清淨之府無所受無所輸淡淡然也其體重三兩三銖包精汁三合居肝之短葉問與肝形質相合在干為甲在支司寅在八卦為震與肝為表裡其經多氣而少血子時氣血注此其見證也口苦善太息心脅痛不能轉側甚則面微塵體無膏足外反熱頭角頷痛目銳角痛缺盆腫痛馬刀挾癭小指次指不為用其經之脈受手少相之交起於目外眥之瞳子髎由聽會客主人上抵頭角歷頷厭下懸顱懸釐外循耳上髮際至曲鬢率谷由率谷外折下耳後循天衝浮白竅陰完骨又自完骨外折上會於少陽三焦之角孫循本神會足太陽膀胱之曲差下行循本經之陽白復會膀胱之睛明上行循本經之臨位目窗正營承靈腦空風池由風池循頸會於手少陽三焦之天牖下至肩上以循本經之肩井左右相交出手少陽之後會督之大椎膀胱之大杼小腸之秉風蓋秉風乃手太陽陽明少陽及足少陽四經之所會也前入足陽明之缺盆下腋循胸歷淵液輒筋日月會帶脈之季脅循本經京門帝脈五樞維道居髎上髀中橫過折下循環跳而下歷髀外行太陽陽明之間循中瀆陽關出膝外廉抵陽陵泉由陽陵泉下行外輔骨歷陽交外丘光明直下抵絕骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨位地五會俠谿上入小指次指之間竅陰穴而終其支別者自足跗面臨位穴別行入大指循大指本節後岐骨內出大指端貫爪甲後之三毛入爪甲而交於足厥陰之肝經由大敦行間太衝而上行也按此經頸部有三曲折圖難盡其形狀故為之詳說以便觀覽自瞳子髎至風池凡二十穴作三折向外而行始於瞳子髎至完骨為一折自完骨外折上至陽明會睛明為一折自睛明上行循臨位風池為一折緣其穴曲折不可旁註乃作一至二十次第以該之一瞳子髎二聽會三容主人四頷厭五懸顱六懸釐七曲鬢八率谷九天衝十浮白十一竅陰十二完骨十三本神十四陽白十五臨位十六目窗十六正營十八承靈十九腦空二十風池膽經諸穴歌足少陽膽四十三瞳子髎與聽會安客主人同頷厭集懸顱懸釐曲鬢行率谷天衝浮白繼竅陰完骨本神當陽白臨泣目窗住正營承靈腦空行風池肩井兼淵液輒筋日月京門關帶脈五樞維道續居髎環跳接中瀆陽關陽陵復陽交外丘光明陽輔交懸鐘丘墟足臨位地五俠谿竅陰畢又分寸歌足少陽兮四十三頭上二十穴分三折起自瞳子至風池積數陳之依次第瞳子髎近眥五分耳前陷中尋聽會耳微前陷中上關下一寸客主人名上關同耳前起骨開口空頷厭懸顱之二穴腦空上廉曲角下腦空即顳顬頷厭懸顱二穴在曲角之下腦空之上懸釐之穴異於茲腦空下廉曲角上曲鬢耳上髮際隅耳上髮際曲隅陷中率谷耳上寸半安此穴在耳上些天衝耳後入發二耳後入髮際二寸浮白入發一寸間亦耳後些竅陰即是枕骨穴完骨之上有空連在完骨上枕骨下動搖有空完骨耳後入髮際量得四分須用記本神神庭旁三寸入發一寸耳上系陽白眉上方一寸發上五分臨泣用目上直入髮際五分陷中發上一寸當陽穴發上半寸目窗貢正營發上二寸半承靈發上四寸擁腦空發上五寸半風池耳後發陷中耳後顳顬後腦空下發際陷中肩井肩上陷中求大骨之前一寸半肩上陷中缺盆上大骨前一寸半以三指按取當中指陷中淵液腋下方三寸輒筋期下五分判期門卻是肝經穴相去巨闕四寸半日月期門下五分京門監骨下腰絆監骨下腰中季脅本夾脊腎之募帶脈章門下寸八五樞章下四八貫五樞去帶脈三寸季脅下四寸八分維道章下五寸三居髎章下八寸三章門緣是肝經穴下脘之旁九寸含環跳髀樞宛宛中髀樞中側臥屈上足伸下足以右手摸穴左搖撼取之屈上伸下取穴同風市垂手中指盡膝上五寸中瀆論髀外膝上五寸肉間陷中陽關陽陵上三寸陽陵膝下一寸從陽交外踝上七寸踝上六寸外丘用踝上五寸光明穴踝上四寸陽輔分踝上三寸懸鐘在丘墟踝前之陷中此去俠谿四寸五卻是膽經原穴功臨泣俠谿後寸半地五會去溪一寸俠谿在指岐骨間竅陰四五二指端足厥陰肝經左右共二十八穴肝臟之圖肝重四斤四兩左二葉右四葉附脊第九椎卮言曰肝者干也屬木象木枝幹也足厥陰經肝肝者將軍之官謀慮出焉主納血為血海魂之居也其華在爪其充在筋其位東其時春其色青其脈弦而長其臭臊其聲呼在七情為怒在六氣為風在五味為酸在於為乙在支司卯在八卦為巽在五行屬木其母腎水其子心火其克脾上其賊肺金其外候陰器與膽為表裡其經少氣而多血丑時氣血注此其不足則悲其有餘則怒其平脈弦其賊脈澀其死庚辛日其畜雞其穀麥上為歲星其見證也頭痛脫色善潔耳無聞頰腫肝逆面青目赤腫痛兩脅下痛引小腹胸痛脅腫婦人小腹腫腰痛不可俯仰四肢滿悶挺長熱嘔逆睪疝暴癢足逆寒胻善瘛遺溺淋溲便難癃狐疝㿗冒眩轉筋陰縮筋攣善恐胸中喘罵詈血在脅下喘恚怒氣逆上而不下則傷肝實則夢山林大樹虛則夢細草苔蘚怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸酸走筋筋病毋多食酸多食辛則筋攣急而爪枯其經之脈受足少陽之交起於足大指聚毛之大敦循足附上廉歷行間太衝抵內躁前一寸之中封自中封上踝過足太陰脾經之三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉以至膝關曲泉上行循股內之陰包五里陰廉遂當足太陰衝門府舍之分入任脈之陰毛中左右相交環繞陰器抵小腹而上會於任脈曲骨中極關元之穴循本經之章門至期門之所挾胃屬肝下足少陽膽經日月之分絡於膽由期門上貫膈行足太陰脾經食竇之外大包之裡散布脅下上手太陰肺經之雲門足少陽淵腋之間足陽明胃人迎之外循喉嚨之後上入頏顙再行足陽明胃經地倉人迎四白之外連目系上出額行膽經臨泣之裡與督脈會與巔頂之百會其支者從目系下行任脈之外本經之中下頰裡交環於唇口之內其又支者從期門屬肝處別貫膈行足太陰脾經食竇之外本經之裡上注肺下行至中焦挾任之中脘之分以交於手太陰之經由中府雲門天府而下行也肝經諸穴歌足厥陰一十四穴終起大敦於行間循太衝於中封蠡溝中封之會膝關曲泉之宮襲陰包乾五里陰廉乃發尋羊矢於章門期門可攻又分寸歌足大指端名大敦內側為隱白外側為大敦行間大指縫中存太衝本節後二寸踝前一寸號中封足內踝骨前一寸筋里宛宛中蠡溝踝上五寸是內踝骨前上五寸中都踝上七寸中內踝上七寸前骨中膝關犢鼻下二寸曲泉曲膝盡橫紋陰包膝上方四寸股內廉兩筋間蜷足取之看膝內側必有陷中氣衝三寸下五里氣下三寸陰股中動脈應手陰廉衝下有二寸羊矢衝下一寸許氣衝卻是胃經穴鼠鼷之上一寸主鼠鼷橫骨端盡處相去中行四寸止章門下脘旁九寸肘尖盡處側臥取期門又在巨闕旁四寸五分無差矣巨闕任脈穴臍上六寸五分任脈二十四穴任脈論任者總也乃腎之配與督本一源而分為二歧也督乃由會陽而行背任則由會陰而行腹人身任督猶天地南北也可以分可以合分之見陰陽之不雜合之見渾淪之無間其見證也苦內結男子為七疝女子為瘕聚其脈起於中極下會陰之分由是循曲骨上毛際至中極行腹裡循關元石門氣海陰交神闕水分下脘建里中脘上脘巨闕鳩尾中庭膻中玉堂紫宮華蓋璇璣天突廉泉上頤循承漿至齦交分行系兩目之中央會承泣而終其支者起於包中循脊裡為經絡之海其浮而外者循腹上行會於咽喉別絡唇口氣血盛則肌肉熱血獨盛則滲灌皮膚而生毫毛婦人月事數下不足於血衝任二脈俱傷不能榮其口唇是以髭鬚不生任脈諸穴歌任脈二十四穴行腹與胸會陰始兮曲骨從中極關元石門可通氣海陰交神闕水分下脘建里兮中脘上脘巨闕鳩尾兮中庭膻中玉堂上紫宮華蓋璇璣上天突之尊飲彼廉泉承漿味融又分寸歌任脈會陰兩陰間曲骨毛際陷中安中極臍下四寸取關元臍下三寸連臍下二寸名石門臍下寸半氣海全臍下一寸陰交穴臍之中央即神闕臍上一寸為水分臍上二寸下脘列臍上三寸名建里臍上四寸中脘許臍上五寸上脘在巨闕臍上六寸五鳩尾蔽骨下五分中庭膻下六寸取膻中卻在兩乳間膻上寸六玉堂主膻上紫宮三寸二膻上華蓋四八舉四寸八分膻上璇璣五寸入璣上一寸天突起天突喉下約四寸廉泉頷下骨尖已承漿頤前唇稜下任脈中央行腹裡督脈共二十八穴督脈論督者都也行背部之中行為陽脈之都綱乃奇經八脈之一也其見證也脊強而腰厥其脈起於下極之所循長強並脊裡而上行歷腰俞陽關命門懸樞脊中中樞筋束至陽靈臺神道身柱過足太陽之風門循陶道大椎啞門至風府入腦循腦戶強間後頂上巔至百會前頂囟會上星神庭循額至鼻柱歷素髎水溝兌端至齦交而終其支者起於小腹之下骨中央女子入系庭孔之端其細絡循陰器合篡間繞篡後別繞臀至少陰與太陽中路合上股內後廉貫脊屬腎與足太陽起目內眥上額交巔入絡腦還出別下項循肩脖內挾脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其小腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之中督脈諸穴歌督脈在背之中行二十八穴始長強舞腰俞兮歌陽關入命門兮懸樞間脊中中樞筋束乃造至陽靈臺上神道身柱陶道以大椎而駐症門風府兮腦戶強間後頂百會兮前頂在前囟會近上星之照神庭見素髎之妙水溝至兌端而無差齦交居唇內而病療又分寸歌督脈齦交唇內鄉兌端正在唇端央水溝鼻下溝中索素髎宜向鼻端詳頭形北高面南下先以前後髮際量分為一尺有二寸發上五分神庭當發上一寸上星位發上二寸囟會良發上前頂三寸半發上百會五寸央在頂中央旋毛中會後寸半即後頂會後三寸強間明會後腦戶四寸半後發入寸風府行頂後發入一寸大筋內宛宛中發上五分瘂門在發後際上五分項中央宛宛中仰頭取之入系舌本神庭至此十穴真自此項骨下脊骶分為二十有四椎大椎上有項骨在約有三椎莫算之尾有長強亦不算中間二十一可排推大椎大骨為第一二椎節內陶道知第三椎間身柱在第五神道不須疑第六靈臺至陽七第九身內筋束思第十中樞十一脊中之穴在十二懸樞之穴奇十四命門腎俞並十六陽關自可知二十一椎即腰俞脊尾骨端長強隨手經起止圖少澤穴手太陽小指之穴在手指之端外側小腸脈起於此穴止於聽宮少衝穴手少陰心經之穴在手小指內廉去爪甲如韭葉心脈起於極泉止於此穴關衝穴手少陽三焦之穴在手小指次指之外側即手第四指之端也三焦脈起於此穴止於絲竹空中衝穴手厥陰心包之穴在手中指之端包絡脈起於天池止於此穴商陽穴手陽明大腸之穴在手大指次指之端大腸脈起於此穴止於迎香穴少商穴手太陰肺經之穴在手大指之端內側白肉宛宛中肺脈起於中府止於此穴足經起止圖湧泉穴足少陰腎經之穴在足心腎脈起於此穴止於俞府至陰穴足太陽膀胱之穴在足小指外側之端膀胱脈起於睛明止於此穴竅陰穴足少陽膽經之穴在足小指次指之端膽脈起於瞳子髎止於此穴厲兌穴足陽明胃經之穴在足大指內次指之端胃脈起於承泣止於此穴隱白穴足太陰脾經之穴在足大指之外側也脾脈起於此穴止於大包大敦六足厥陰肝經之穴在足大指之端三毛之中肝脈起於此穴止於期門凡言手經者手之三陰從胸走手手之三陽從手走頭脈氣之行不至於足也凡言足經者足之三陰從足走胸足之三陽從頭走足脈氣之行不至於手也此手足陰陽之說較之井榮俞經合之說簡而明書之以便後學觀覽以上圖論詳註明陰陽交接陽不混於陰陰不混於陽以見陰陽之不雜以下借為問答明陰陽交濟陽中有陰陰中有陽以見陰陽之不離或問頭為諸陽之首陰氣自𩓐項而回如手三陰肩胸走手足三陰自足走胸全不及於頭面然則頭面之部全無陰乎答曰何得無陰如眼者肝之竅肝乃足厥陰經也鼻者肺之竅肺乃手太陰經也耳者腎之竅腎乃足少陰經也舌者心之竅心乃手少陰經也口者脾之竅脾乃足太陰經也何嘗無陰或問十二經有十二絡共任督脾絡而為十五絡其經一一相傳宜皆謂之經其經之外又何者為絡也答曰人身脈氣之行直行大隧者為經分支交經者為絡十二經之絡乃十二經之別也蓋別者本經脈氣行至交經之處所交之經則直行其經矣而本經之脈則散之諸經以養諸經之脈而別行之所謂絡脈也如手太陰肺經其脈氣之行起於中焦自胸部中府穴下行至手大指之少商穴而止自此其脈氣則散於諸經以養諸經之脈自列缺穴交手陽明大腸經而陽明經則又自手大指次指之端商陽穴往上而直行其經矣此言肺之一經諸經仿此蓋人之一身經有不到之處絡無不到之處矣或問人身有陰陽六臟屬陰六腑屬陽足三陰自足走胸手三陰自胸走手手三陽自手走頭可易知也足三陽自頭走足足三陽是膽胃膀胱三腑俱在下部又謂之足經其經脈之行宜自足而上乃自頭而下者何也答曰人身一天地也羅膈以上屬天羅膈以下屬地所以云呼出於心肺天也陽也吸納於腎肝地也陰也頭面耳目口鼻舌五臟之透竅陰也手三陽足三陽俱在頭陽也亦上陽下陰之意此皆人身生定不易之陰陽也至於經絡之流行自陰傳陽自陽傳陰又一身流動之陰陽也人之一身上則屬陽天也下則屬陰地也天地陰陽人生之始其部位各一分定足三陽部位穴情既定於頭其脈氣之流動烏得不自高而下行也大抵諸經脈氣經絡未交寂然不動經絡一交脈氣即行是人身流動之陰陽皆生定不易之陰陽相交接也人身是一小天地今再以天地之陰陽申言之天屬陽地屬陰此天地已定之陰陽至於地氣上升而為云天氣下降而為雨又天地交泰流動之陰陽也晝則屬陽夜則屬陰亦天地已定之陰陽至於晝而復夜夜而復晝日者陽之精月者陰之精每一月初旬則日前行而月後先陽而後陰也十五之後則月前行而日後先陰而後陽也陰陽交濟亦流動之陰陽也由此推之人身之陰陽可洞悉矣或問真陽之氣蓄於命門陽氣鼓動煦育無形之氣生有形之質先天之元氣在於此其氣熏蒸臟腑腐化水穀後天之氣血生於此命門之所由稱也而十二經之中不載命門何也答曰命門之氣人之有生胞胎凝結即含此氣其氣熏蒸煦育先天無形之真陽生後天有形之臟腑先生兩腎其次腎生脾脾生肝肝生肺肺生心以生其勝己者腎屬水故五臟由是而為陰其次心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀胱三焦以生其己勝者小腸屬火故六腑由是而為陽則命門實五臟六腑之根蒂陰陽之橐龠十二經之總司也且其氣與膈膜脂膏之內五臟六腑之隙水穀流化之關融會於其間熏蒸膈膜腐化水穀發達皮膚分肉運行四旁五臟非此悉皆寒凝之質六腑非此難成腐化之功是命門之氣統通臟腑默行十二經絡豈一經之所能盡十二經之所能遺者哉何謂不載十二經臟腑圖十二經歌太陽小腸足膀胱陽明大腸足胃當少陽三焦足膽配太陰手肺足脾鄉少陰心經足為腎厥陰包絡足肝方十二經臟腑表裡圖經有十二絡有十五心肝脾肺腎為五臟並心包絡為六臟大小腸膽胃膀胱並三焦為六腑合之而為十二經十二經各有其絡共陽蹺陰蹺脾之大絡為十五絡十五絡之外猶有支絡蓋經者徑也經脈之行以氣血之流行周身經常而不斷者言也如川流之不息矣絡猶兜也如人橫線為絡以兜物也絡脈之行以氣血之分布一身無微而不周者言也如川流之分派而不泄矣有云十二經加督脈任脈為十五絡非陰蹺陽蹺也少不知當看一別字十二經共督任二脈之別為十五絡別即陰蹺陽蹺非有二也五臟臟者藏也藏精氣而不泄滿而不實如心肺皆有空竅肝腎脾亦有小小筒系條數不一之空竅心包亦然六腑腑者空也傳化物而不藏實而不滿如腸胃皆空飲食入胃則胃實而腸空下入於腸則腸實而胃空實則又下行矣膀胱亦然十二經所屬歌手經太陽屬小腸膀胱經屬足太陽肝足厥陰手包絡胃足陽明手大腸膽屬少陽足經尋三焦手內少陽臨腎足少陰手是心脾足太陰手肺金十二經納甲歌此歌諸腑配陽諸臟配陰甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎藏三焦陽腑須歸丙包絡從陰丁火旁舊云三焦亦向壬中寄包絡同歸入癸方雖三焦為決瀆猶可言壬而包絡附心主安得云癸且二臟表裡皆相火也今改正之十二經氣血多少歌多氣多血惟陽明少氣太陽同厥陰二少太陰常少血六經氣血須分明十二經註釋少陽陽之始一陽初出地外即嫩陽也故謂之少陽太陽陽之盛陽氣升至極之分也故謂之太陽陽明居太陽少陽之中兩陽合明曰陽明陰陽等也少陰陰之始太陰陰之盛厥陰者兩陰交盡曰厥榮衛清濁升降論清氣為榮清者休之上也陽也火也離中之陰降午後一陰生即心之生血故曰清氣為榮濁氣為衛濁者體之下也陰也水也坎中之陽升子後一陽生即腎陽舉而使之故曰濁氣為衛地之濁不能升地之清能升為陽舉而使之上也天之清不降天之濁能降為陰驅而使下也經曰地氣上為云天氣下為雨此之謂也入式訣諸臟腑已各有圖穴注於冊論中矣依此圖穴另再各畫一張統共置於面前或臟或腑將每經圖論一一隨穴挨著有上行者有下行者有從身後正行身前正行與偏行者其墨線是脈行之路墨圈是脈絡之穴細細辨明或本經有遇他經穴名者即以他經穴圖與本經穴圖並看庶知本經穴圖與他經穴圖其經脈之行或在一路或相隔幾寸幾分之不同隨穴圖將經絡所行之路一一認明只記脈行起止二穴是借穴以審經絡不必如專門針灸每穴而記之也衝脈論沖者要也言其為陰脈之海通受諸經之氣血也衝脈者與任脈皆起於胸中上循脊裡為經絡之海其浮於外者循腹上會於咽喉終唇口其支者起於足陽明之氣衝並足少陰之經挾臍左右各五分上行至胸中而散其見證也令人逆氣裡急帶脈論言其總束諸脈如帶也帶脈起於季脅環身一周如帶與足少陽會於維道其見證也腰腹從容如囊水之狀若婦女則赤白帶證蓋由濕熱於此滲流而下故名帶下陽蹺脈論蹺者言其為健足行步之關要也陽蹺起於跟中循外踝上行入風池其脈長八尺生於足太陽之申脈與足少陰會於居髎與手陽明會於肩髃巨骨與手足太陽會於陽維會與小腸經之臑俞與手足陽明會於胃經之地倉巨髎又與任脈會於胃之承泣其見證也令人陰緩而陽急並宜刺之陰蹺脈論陰蹺脈亦起於跟中循內踝上行至咽喉交貫衝脈亦長八尺生於足少陰然谷之後上內踝循陰股入陰至胸裡入缺盆出胃經人迎之前入鼻屬目內眥合於太陽女子以為之經男子以為之絡其見證也令人陽緩而陰急此經之病多取足少陽之交信內踝上二寸蓋以交信為郄云陽維脈論陽維者維於陽為諸陽之會與陰維皆絡於身若陽不能維於陽則溶溶不能自收持其脈起於足太陽之金門與手足太陽及陽蹺會於小腸之臑俞與手之太陽會三焦之天髎在缺盆之上膽之肩井又與足少陽會於陽白上循膽之本神臨泣正當腦空下至風池與督脈會於風府啞門其見證也苦寒熱陰維脈論陰維者維於陰為諸陰之會與陽維皆絡於身若陰不能維於陰則悵然失志其經起於足少陽之築賓與足太陰會子脾之腹哀大橫與太陰厥陰會於脾之府舍肝之期門與任脈會於任之天突廉泉其見證也苦心痛奇經八脈總論經云脈有奇常者何蓋人之氣血常行於十二經常脈之中若常脈滿溢則流入奇經其八脈者任脈任於前督脈督於後帶脈束於中衝脈為諸脈之海陽維則維絡諸陽陰維則維絡諸陰陽蹺本諸太陽之別陰蹺本諸少陰之別譬諸聖人設溝渠以備水道而無濫溢之患故總八脈為一篇以備參考云內景圖舊圖有精道循脊背過肛門者甚屬非理而且無子宮命門之象皆大失也今改正之心系七節七節之旁中有小心以腎系十四椎下由下而上亦七節也內景賦嘗計夫人生根本兮由乎元氣表裡陰陽兮升降沉浮出入運行兮周而復始神機氣立兮生化無休經絡兮行乎肌表臟腑兮通於咽喉喉在前其形堅健咽在後其質和柔喉通呼吸之氣氣行五臟咽為飲食之道六腑源頭氣食兮何能不亂主宰者會厭分流從此兮下咽入膈贓腑兮陰陽不侔五臟者肺為華蓋而上連喉管肺之下心包所護而君主可求此即膻中宗氣所從膈膜周蔽清虛上宮脾居膈下中州胃同膜聯胃左運化乃功肝葉障於脾後膽腑附於葉東兩腎又居脊下腰間有脈相通主閉蟄封藏之本為二陰天一之宗此屬喉之前竅精神須賴氣充又如六腑陽明胃先熟腐水穀胃脘通咽上口稱為賁門穀氣從而散宣輸脾經而達肺誠肺腑之大源歷幽門之下口聯小腸而盤旋再小腸之下際有闌門者在焉此泌別之關隘分清濁於後前大腸接其右導渣穢於大便膀胱無上竅由滲泄而通泉羨二陰之和暢皆氣化之自然再詳夫藏府略備三焦未言號孤獨之府擅總司之權體三才而定位法六合而象天上焦如霧兮靄氤氳之天氣中焦如漚兮化營血之新鮮下焦如瀆兮主宣通乎雍滯此所以上焦主內而不出下焦主出而如川又總諸臟之所居隔高低之非類求脈氣之往來果何如而相濟以心主之為君朝諸經之維繫是故怒動於心肝從而熾欲念方萌腎經精沸構難釋之苦思枯脾中之生意肺脈澀而氣沉為悲憂於心內惟脈絡有以相通故氣得從心而至雖諸臟之歸心實上系之聯肺肺氣何生根從脾胃賴水穀於敖倉化精微而為氣氣旺則精盈精盈則氣盛此是化源根坎里藏真命雖內景之緣由尚根苗之當究既云兩腎之前又曰膀胱之後出大腸之上左居小腸之下右其中果何所藏蓄坎離之交姤為生氣之海為元陽之竇闢精血於子宮司人生之夭壽稱命門者是也號大根者非謬使能知地下有雷聲方悟得春光彌字宙
